<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tankowania">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ewidencja tankowań</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  font-family:'Roboto',sans-serif;
  background:#111827;
  color:#f9fafb;
  -webkit-text-size-adjust:100%;
}

body{
  min-height:100vh;
  min-height:-webkit-fill-available;
  overflow-x:hidden;
}

.header{
  background:#111827;
  padding:52px 32px 44px;
  text-align:center;
  border-bottom:1px solid #1f2937;
}
.logo-wrap{
  width:78%;max-width:360px;
  margin:0 auto 22px;
}
.logo-wrap img{width:100%;height:auto;display:block;}

.header-title{
  font-size:22px;
  font-weight:700;
  color:#e5e7eb;
  letter-spacing:4px;
  text-transform:uppercase;
}

.sekcja{
  margin:24px 18px 0;
  background:#1a2235;
  border-radius:20px;
  overflow:hidden;
  border:1px solid #1f2937;
}
.sekcja-head{
  display:flex;align-items:center;gap:18px;
  padding:24px 26px;
  border-bottom:1px solid #1f2937;
}
.sekcja-num{
  width:48px;height:48px;
  border-radius:50%;
  background:#007DC5;
  color:#fff;
  font-size:20px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sekcja-tytul{
  font-size:20px;font-weight:700;color:#f9fafb;
}
.sekcja-body{padding:24px 20px;}

.siatka{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
}
.pojazd-btn{
  background:#111827;
  border:2px solid #1f2937;
  border-radius:16px;
  padding:32px 10px;
  font-family:'Roboto',sans-serif;
  font-size:20px;font-weight:700;
  color:#6b7280;
  cursor:pointer;text-align:center;
  transition:all .15s;
  letter-spacing:0.5px;width:100%;
}
.pojazd-btn:active{transform:scale(.96)}
.pojazd-btn.wybrany{background:#007DC5;border-color:#007DC5;color:#fff;}

input[type=date],input[type=number]{
  display:block;width:100%;
  background:#111827;
  border:2px solid #1f2937;
  border-radius:16px;
  padding:26px 22px;
  font-family:'Roboto',sans-serif;
  font-size:20px;font-weight:500;
  color:#f9fafb;
  outline:none;
  appearance:none;-webkit-appearance:none;
  -webkit-text-fill-color:#f9fafb;
}
input[type=date]:focus,input[type=number]:focus{border-color:#007DC5;}
input[type=number]::placeholder{color:#374151}
input[type=date]::-webkit-calendar-picker-indicator{
  filter:invert(1);opacity:.4;width:24px;height:24px;
}

.strefa{
  border:2px dashed #1f2937;border-radius:18px;
  padding:56px 20px;text-align:center;
  background:#111827;
  position:relative;overflow:hidden;cursor:pointer;
}
.strefa input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.strefa svg{margin:0 auto 18px;display:block;}
.strefa-tekst{color:#374151;font-size:18px;line-height:1.7;}
.strefa-tekst strong{color:#007DC5;font-weight:700;}

#podglad-wrap{display:none;margin-top:18px;}
#podglad-wrap img{width:100%;border-radius:16px;max-height:300px;object-fit:cover;}
.zmien-link{
  display:none;margin-top:14px;text-align:center;
  font-size:17px;font-weight:500;color:#007DC5;cursor:pointer;text-decoration:underline;
}

.btn-wyslij{
  display:block;
  width:calc(100% - 36px);
  margin:28px 18px 0;
  background:#007DC5;
  color:#fff;border:none;border-radius:18px;
  padding:30px 20px;
  font-family:'Roboto',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:0.5px;cursor:pointer;
  transition:opacity .2s,transform .1s;
}
.btn-wyslij:active{transform:scale(.98)}
.btn-wyslij:disabled{opacity:.3;cursor:not-allowed}

.spinner{
  display:none;text-align:center;padding:24px;color:#374151;font-size:18px;
}
.spinner::before{
  content:'';display:inline-block;width:26px;height:26px;
  border:3px solid #1f2937;border-top-color:#007DC5;
  border-radius:50%;animation:spin .7s linear infinite;
  margin-right:12px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

.komunikat{
  margin:24px 18px 0;border-radius:18px;
  padding:30px 22px;text-align:center;
  font-size:20px;font-weight:500;
  display:none;line-height:1.5;
}
.komunikat.sukces{background:#0d3320;color:#4ade80;border:1px solid #166534;}
.komunikat.blad{background:#3b0a0a;color:#f87171;border:1px solid #7f1d1d;}
.komunikat small{display:block;margin-top:8px;font-size:15px;opacity:.7;font-weight:400;}

.spacer{height:48px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <img src="logo.png" alt="DELTAPRIME">
  </div>
  <div class="header-title">Ewidencja tankowań</div>
</div>

<div class="sekcja">
  <div class="sekcja-head">
    <div class="sekcja-num">1</div>
    <div class="sekcja-tytul">Wybierz pojazd</div>
  </div>
  <div class="sekcja-body">
    <div class="siatka" id="siatka-pojazdow"></div>
  </div>
</div>

<div class="sekcja">
  <div class="sekcja-head">
    <div class="sekcja-num">2</div>
    <div class="sekcja-tytul">Data tankowania</div>
  </div>
  <div class="sekcja-body">
    <input type="date" id="data-tankowania">
  </div>
</div>

<div class="sekcja">
  <div class="sekcja-head">
    <div class="sekcja-num">3</div>
    <div class="sekcja-tytul">Stan licznika (km)</div>
  </div>
  <div class="sekcja-body">
    <input type="number" id="licznik" placeholder="np. 123456" inputmode="numeric" min="0">
  </div>
</div>

<div class="sekcja">
  <div class="sekcja-head">
    <div class="sekcja-num">4</div>
    <div class="sekcja-tytul">Zdjęcie licznika</div>
  </div>
  <div class="sekcja-body">
    <div class="strefa" id="strefa">
      <input type="file" id="plik-zdjecia" accept="image/*" capture="environment" onchange="podgladZdjecia(this)">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <div class="strefa-tekst">Dotknij, aby <strong>zrobić zdjęcie</strong><br>lub wybrać z galerii</div>
    </div>
    <div id="podglad-wrap"><img id="img-podglad" src="" alt="Podgląd"></div>
    <div class="zmien-link" id="btn-zmien" onclick="zmienZdjecie()">↩ Zmień zdjęcie</div>
  </div>
</div>

<button class="btn-wyslij" id="btn-wyslij" onclick="wyslij()">Zapisz tankowanie</button>
<div class="spinner" id="spinner">Wysyłanie danych…</div>
<div class="komunikat sukces" id="msg-sukces">
  ✅ Tankowanie zapisane!
  <small>Możesz zamknąć aplikację lub dodać kolejny wpis.</small>
</div>
<div class="komunikat blad" id="msg-blad">
  ❌ Błąd zapisu. Spróbuj ponownie.
  <small id="blad-szczegoly"></small>
</div>
<div class="spacer"></div>

<script>
// ── KONFIGURACJA ── wklej URL swojego Apps Script po wdrożeniu
var SCRIPT_URL = 'https://script.google.com/a/macros/deltaprime.pl/s/AKfycbwH3JNbqH5R7-tJMpWApST1ZBlHSC9PpwRH9qW4uQRWQYwP8VdES28SmPATbHUXW7xQfA/exec';

var POJAZDY = ['SG 315EU','SG 378EA','SK 160YH','SK 382YK'];

var wybranyPojazd=null,zdjecieBase64=null,zdjecieMime=null,zdjecieNazwa=null;

// Generuj kafelki pojazdów
(function(){
  var s = document.getElementById('siatka-pojazdow');
  POJAZDY.forEach(function(p){
    var b = document.createElement('button');
    b.className = 'pojazd-btn';
    b.textContent = p;
    b.setAttribute('data-val', p);
    b.onclick = function(){ wybierz(b); };
    s.appendChild(b);
  });
})();

// Ustaw dzisiejszą datę
(function(){
  var d=new Date(),p=function(n){return n<10?'0'+n:n;};
  document.getElementById('data-tankowania').value=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
})();

function wybierz(el){
  document.querySelectorAll('.pojazd-btn').forEach(function(b){b.classList.remove('wybrany');});
  el.classList.add('wybrany');
  wybranyPojazd=el.getAttribute('data-val');
}

function podgladZdjecia(input){
  if(!input.files||!input.files[0])return;
  var plik=input.files[0];
  zdjecieMime=plik.type;zdjecieNazwa=plik.name;
  var reader=new FileReader();
  reader.onload=function(e){
    var r=e.target.result;
    zdjecieBase64=r.split(',')[1];
    document.getElementById('img-podglad').src=r;
    document.getElementById('podglad-wrap').style.display='block';
    document.getElementById('btn-zmien').style.display='block';
    document.getElementById('strefa').style.display='none';
  };
  reader.readAsDataURL(plik);
}

function zmienZdjecie(){
  zdjecieBase64=null;
  document.getElementById('plik-zdjecia').value='';
  document.getElementById('podglad-wrap').style.display='none';
  document.getElementById('btn-zmien').style.display='none';
  document.getElementById('strefa').style.display='block';
}

function wyslij(){
  if(!wybranyPojazd){alert('Wybierz pojazd.');return;}
  if(!document.getElementById('data-tankowania').value){alert('Wybierz datę.');return;}
  if(!document.getElementById('licznik').value){alert('Podaj stan licznika.');return;}
  if(!zdjecieBase64){alert('Dodaj zdjęcie licznika.');return;}

  document.getElementById('btn-wyslij').disabled=true;
  document.getElementById('spinner').style.display='block';
  document.getElementById('msg-sukces').style.display='none';
  document.getElementById('msg-blad').style.display='none';

  var dane={
    rejestracja:wybranyPojazd,
    dataTankowania:document.getElementById('data-tankowania').value,
    licznik:document.getElementById('licznik').value,
    zdjecieBase64:zdjecieBase64,
    zdjecieMime:zdjecieMime,
    zdjecieNazwa:zdjecieNazwa
  };

  fetch(SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify(dane)
  })
  .then(function(r){return r.json();})
  .then(function(w){
    document.getElementById('spinner').style.display='none';
    if(w.sukces){
      document.getElementById('msg-sukces').style.display='block';
      document.querySelectorAll('.pojazd-btn').forEach(function(b){b.classList.remove('wybrany');});
      wybranyPojazd=null;
      document.getElementById('licznik').value='';
      zmienZdjecie();
      document.getElementById('btn-wyslij').disabled=false;
    } else {
      document.getElementById('blad-szczegoly').textContent=w.blad||'Nieznany błąd';
      document.getElementById('msg-blad').style.display='block';
      document.getElementById('btn-wyslij').disabled=false;
    }
  })
  .catch(function(err){
    document.getElementById('spinner').style.display='none';
    document.getElementById('blad-szczegoly').textContent=err.message;
    document.getElementById('msg-blad').style.display='block';
    document.getElementById('btn-wyslij').disabled=false;
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
